<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>FuufoonBites 订餐系统</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #ffcc00; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🥐 新订单登记</h2>
    <form id="orderForm">
        <input type="text" id="name" placeholder="顾客姓名" required>
        <input type="tel" id="phone" placeholder="电话号码" required>
        <select id="product">
            <option value="Choux Pastry">Choux Pastry (泡芙)</option>
            <option value="Dorayaki">Dorayaki (铜锣烧)</option>
            <option value="Oden">Oden (关东煮)</option>
        </select>
        <input type="number" id="quantity" placeholder="数量" min="1" value="1">
        <input type="number" id="price" placeholder="总金额 (RM)" required>
        <button type="submit">立即下单</button>
    </form>

    <script>
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // 这里替换成你的 n8n Webhook URL
            const webhookUrl = 'https://ashleigh-preaortic-beefily.ngrok-free.dev/webhook/new-order';

            const data = {
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString(),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                product: document.getElementById('product').value,
                quantity: document.getElementById('quantity').value,
                amount: document.getElementById('price').value,
                status: 'new' // 初始状态
            };

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) alert('下单成功！' + "\n" + "收到您的订单啦！我们会用心准备，请耐心等候，谢谢您的支持哦！✨");
            } catch (error) {
                alert('发送失败，请检查 Webhook 是否开启');
            }
        };
    </script>
</body>
</html>
